<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>🌍 Asteroid Blaster</title>
  <link rel="stylesheet" href="../../css/game-common.css"/>
  <style>
    canvas{display:block;margin:8px auto;border-radius:12px;background:#0a0a1a;max-width:96vw;}
    @media(max-width:600px){canvas{width:96vw!important;height:auto!important;}}
    .ctrls{display:none;justify-content:center;gap:clamp(6px,2vw,12px);margin-top:8px;}
    @media(max-width:600px){.ctrls{display:flex;}}
    .ctrls button{padding:clamp(10px,3vw,16px) clamp(14px,3.5vw,22px);font-size:clamp(.9rem,3vw,1.2rem);font-weight:700;border:none;border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .ctrls button:active{transform:scale(.9);}
    .cb1{background:#3b82f6;color:#fff;}.cb2{background:#ef4444;color:#fff;}.cb3{background:#10b981;color:#fff;}
  </style>
</head>
<body>
  <a href="../../index.html" class="back-btn">← Back</a>
  <div class="game-header"><h1>🌍 Asteroid Blaster</h1></div>
  <canvas id="c" width="400" height="500"></canvas>
  <div class="ctrls">
    <button class="cb1" id="bL">↺</button>
    <button class="cb3" id="bT">🔥</button>
    <button class="cb2" id="bF">FIRE</button>
    <button class="cb1" id="bR">↻</button>
  </div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=400,H=500;
let ship={x:200,y:250,a:0,vx:0,vy:0,thrust:false,r:12};
let bullets=[],asteroids=[],particles=[],score=0,lives=3,gOver=false,keys={};

function resize(){const r=Math.min(window.innerWidth*.96,400)/400;c.style.width=400*r+'px';c.style.height=500*r+'px';}
resize();window.addEventListener('resize',resize);

function spawnAsteroid(sz,x,y){
  sz=sz||2;
  const a=Math.random()*Math.PI*2,sp=1+Math.random()*1.5;
  asteroids.push({x:x??Math.random()*W,y:y??0,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:sz===2?35:sz===1?20:12,sz:sz,
    pts:Array.from({length:8},(_,i)=>({a:i*Math.PI/4,r:(sz===2?35:sz===1?20:12)*(0.7+Math.random()*0.5)}))});
}

function init(){
  ship={x:200,y:250,a:-Math.PI/2,vx:0,vy:0,thrust:false,r:12};
  bullets=[];asteroids=[];particles=[];score=0;lives=3;gOver=false;
  for(let i=0;i<4;i++)spawnAsteroid(2);
}

function fire(){
  if(gOver)return;
  const bx=ship.x+Math.cos(ship.a)*15,by=ship.y+Math.sin(ship.a)*15;
  bullets.push({x:bx,y:by,vx:Math.cos(ship.a)*7,vy:Math.sin(ship.a)*7,life:60});
}

function explode(x,y,col){
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:25+Math.random()*15,col:col||'#feca57'});
  }
}

function wrap(o){if(o.x<-20)o.x=W+20;if(o.x>W+20)o.x=-20;if(o.y<-20)o.y=H+20;if(o.y>H+20)o.y=-20;}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

function update(){
  if(gOver)return;
  // ship rotation & thrust
  if(keys['ArrowLeft']||keys['left'])ship.a-=0.07;
  if(keys['ArrowRight']||keys['right'])ship.a+=0.07;
  if(keys['ArrowUp']||keys['thrust']){
    ship.vx+=Math.cos(ship.a)*.15;ship.vy+=Math.sin(ship.a)*.15;ship.thrust=true;
  }else ship.thrust=false;
  // drag
  ship.vx*=.99;ship.vy*=.99;
  ship.x+=ship.vx;ship.y+=ship.vy;wrap(ship);
  // bullets
  bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;wrap(b);});
  bullets=bullets.filter(b=>b.life>0);
  // asteroids
  asteroids.forEach(a=>{a.x+=a.vx;a.y+=a.vy;wrap(a);});
  // particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;p.vx*=.96;p.vy*=.96;});
  particles=particles.filter(p=>p.life>0);
  // collisions: bullet-asteroid
  let newA=[];
  bullets.forEach(b=>{
    let hit=false;
    asteroids=asteroids.filter(a=>{
      if(!hit&&dist(b,a)<a.r){
        hit=true;score+=a.sz===2?20:a.sz===1?50:100;
        explode(a.x,a.y);
        if(a.sz>0){newA.push();spawnAsteroid(a.sz-1,a.x,a.y);spawnAsteroid(a.sz-1,a.x,a.y);}
        return false;
      }return true;
    });
    if(hit)b.life=0;
  });
  asteroids.push(...newA);
  // collision: ship-asteroid
  asteroids.forEach(a=>{
    if(dist(ship,a)<a.r+ship.r){
      lives--;explode(ship.x,ship.y,'#ef4444');
      ship.x=200;ship.y=250;ship.vx=0;ship.vy=0;
      if(lives<=0)gOver=true;
    }
  });
  // respawn
  if(asteroids.length===0){for(let i=0;i<4+Math.floor(score/200);i++)spawnAsteroid(2);}
}

function drawShip(){
  ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.a);
  ctx.fillStyle='#00f260';ctx.beginPath();
  ctx.moveTo(15,0);ctx.lineTo(-10,9);ctx.lineTo(-6,0);ctx.lineTo(-10,-9);ctx.closePath();ctx.fill();
  if(ship.thrust){
    ctx.fillStyle='#ff9f43';ctx.beginPath();
    ctx.moveTo(-8,4);ctx.lineTo(-18+Math.random()*5,0);ctx.lineTo(-8,-4);ctx.closePath();ctx.fill();
  }
  ctx.restore();
}

function draw(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  // stars
  ctx.fillStyle='#334';
  for(let i=0;i<40;i++){const sx=(i*97)%W,sy=(i*151)%H;ctx.fillRect(sx,sy,1.5,1.5);}
  drawShip();
  // bullets
  ctx.fillStyle='#feca57';
  bullets.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,2.5,0,Math.PI*2);ctx.fill();});
  // asteroids
  asteroids.forEach(a=>{
    ctx.strokeStyle='#8899aa';ctx.lineWidth=2;ctx.beginPath();
    a.pts.forEach((p,i)=>{const px=a.x+Math.cos(p.a)*p.r,py=a.y+Math.sin(p.a)*p.r;i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);});
    ctx.closePath();ctx.stroke();
  });
  // particles
  particles.forEach(p=>{ctx.globalAlpha=p.life/40;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  // HUD
  ctx.fillStyle='#fff';ctx.font='bold 18px sans-serif';ctx.textAlign='left';
  ctx.fillText('Score: '+score,12,28);
  ctx.fillText('❤️'.repeat(lives),12,52);
  if(gOver){
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ef4444';ctx.font='bold 36px sans-serif';ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-10);
    ctx.fillStyle='#aaa';ctx.font='18px sans-serif';
    ctx.fillText('Score: '+score,W/2,H/2+25);
    ctx.fillText('Tap or R to restart',W/2,H/2+55);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '){e.preventDefault();fire();}
  if(e.key==='r'&&gOver)init();
});
document.addEventListener('keyup',e=>keys[e.key]=false);

// mobile controls
const bL=document.getElementById('bL'),bR=document.getElementById('bR'),bT=document.getElementById('bT'),bF=document.getElementById('bF');
bL.addEventListener('touchstart',e=>{e.preventDefault();keys['left']=true;});
bL.addEventListener('touchend',()=>keys['left']=false);
bR.addEventListener('touchstart',e=>{e.preventDefault();keys['right']=true;});
bR.addEventListener('touchend',()=>keys['right']=false);
bT.addEventListener('touchstart',e=>{e.preventDefault();keys['thrust']=true;});
bT.addEventListener('touchend',()=>keys['thrust']=false);
bF.addEventListener('touchstart',e=>{e.preventDefault();fire();});
c.addEventListener('click',()=>{if(gOver)init();});

init();loop();
</script>
</body>
</html>
