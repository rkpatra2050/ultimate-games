<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🐍 Snake</title>
  <link rel="stylesheet" href="../../css/game-common.css" />
  <style>
    #canvas-wrap { position: relative; margin: 0 auto; max-width: 400px; width: min(90vw, 400px); aspect-ratio: 1; }
    canvas { width: 100%; height: 100%; }
    @media(max-width:600px){ #canvas-wrap { width: 96vw; max-width: 96vw; } }
    #overlay { position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,10,26,.88);border-radius:10px;z-index:10;transition:opacity .3s;gap:12px;padding:20px; }
    #overlay.hidden { opacity:0;pointer-events:none; }
    #overlay h2 { font-size:clamp(1.5rem,5vw,2.2rem); }
    .final { font-size:clamp(2rem,8vw,3.5rem);font-weight:900;color:#00f260;text-shadow:0 0 20px rgba(0,242,96,.5); }
    .sub { color:#888;font-size:.95rem; }
    .btn { padding:14px 36px;font-size:1.1rem;font-weight:700;color:#fff;background:linear-gradient(135deg,#00f260,#0575e6);border:none;border-radius:50px;cursor:pointer;letter-spacing:1px;-webkit-tap-highlight-color:transparent; }
    .btn:hover { transform:scale(1.05); }
    .btn:active { transform:scale(0.97); }
    .particle { position:fixed;border-radius:50%;pointer-events:none;z-index:5; }
    /* D-Pad for touch devices */
    .dpad{display:none;margin:12px auto 0;width:fit-content;user-select:none;-webkit-user-select:none;}
    .drow{display:flex;justify-content:center;gap:6px;}
    .dbtn{width:clamp(50px,14vw,64px);height:clamp(50px,14vw,64px);font-size:1.4rem;background:rgba(0,242,96,.12);color:#00f260;border:2px solid rgba(0,242,96,.35);border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
    .dbtn:active{background:rgba(0,242,96,.3);transform:scale(0.93);}
    .dbtn-spacer{width:clamp(50px,14vw,64px);height:clamp(50px,14vw,64px);}
    @media(pointer:coarse){.dpad{display:block;}}
  </style>
</head>
<body>
  <a href="../../index.html" class="back-btn">← Back</a>
  <div class="game-header">
    <h1>🐍 Snake</h1>
    <div class="score-board">
      <span>Score: <strong id="score">0</strong></span>
      <span>Best: <strong id="best">0</strong></span>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="c" width="400" height="400"></canvas>
    <div id="overlay">
      <h2>🐍 Snake</h2>
      <p class="sub">Eat food, grow longer, don't crash!</p>
      <button class="btn" id="playBtn">▶ PLAY</button>
    </div>
  </div>
  <div class="dpad">
    <div class="drow"><div class="dbtn-spacer"></div><button class="dbtn" id="du">▲</button><div class="dbtn-spacer"></div></div>
    <div class="drow"><button class="dbtn" id="dl">◀</button><button class="dbtn" id="dd">▼</button><button class="dbtn" id="dr">▶</button></div>
  </div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d'),G=20,C=20,R=20;
let sn,dr,nd,fd,sc,sp,run=false,go=false,lt=0,ac=0,iq=[];
const sEl=document.getElementById('score'),bEl=document.getElementById('best'),ov=document.getElementById('overlay');
let hi=+localStorage.getItem('sk_hi')||0; bEl.textContent=hi;
const rn=n=>Math.floor(Math.random()*n);
function fp(){let p;do{p={x:rn(C),y:rn(R)}}while(sn.some(s=>s.x===p.x&&s.y===p.y));return p;}
function init(){const cx=10,cy=10;sn=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];dr={x:1,y:0};nd={x:1,y:0};iq=[];fd=fp();sc=0;sp=140;run=true;go=false;sEl.textContent=0;ov.classList.add('hidden');}
function upd(){if(iq.length){const n=iq.shift();if(!(dr.x===-n.x&&dr.y===-n.y))nd=n;}dr={...nd};const h={x:sn[0].x+dr.x,y:sn[0].y+dr.y};if(h.x<0||h.x>=C||h.y<0||h.y>=R||sn.some(s=>s.x===h.x&&s.y===h.y))return die();sn.unshift(h);if(h.x===fd.x&&h.y===fd.y){sc++;sEl.textContent=sc;burst(fd.x,fd.y);fd=fp();sp=Math.max(55,sp-2);}else sn.pop();}
function die(){run=false;go=true;if(sc>hi){hi=sc;bEl.textContent=hi;localStorage.setItem('sk_hi',hi);}ov.innerHTML=`<h2>💀 Game Over</h2><div class="final">${sc}</div><p class="sub">${sc>=hi&&sc>0?'🏆 New High Score!':'Your score'}</p><button class="btn" id="rb">↻ AGAIN</button>`;ov.classList.remove('hidden');document.getElementById('rb').onclick=restart;}
function restart(){init();lt=performance.now();ac=0;}
function burst(gx,gy){const r=c.getBoundingClientRect(),s=r.width/400,cx=r.left+(gx*G+G/2)*s,cy=r.top+(gy*G+G/2)*s;for(let i=0;i<8;i++){const e=document.createElement('div');e.className='particle';const sz=4+rn(5),a=Math.random()*Math.PI*2,d=18+rn(30);e.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;background:hsl(${rn(60)},100%,60%);opacity:1;transition:transform .4s ease-out,opacity .4s ease-out`;document.body.appendChild(e);requestAnimationFrame(()=>{e.style.transform=`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px) scale(0)`;e.style.opacity='0';});setTimeout(()=>e.remove(),450);}}
function draw(){x.fillStyle='#0d1b2a';x.fillRect(0,0,400,400);x.strokeStyle='rgba(255,255,255,.025)';x.lineWidth=.5;for(let i=G;i<400;i+=G){x.beginPath();x.moveTo(i,0);x.lineTo(i,400);x.stroke();x.beginPath();x.moveTo(0,i);x.lineTo(400,i);x.stroke();}if(!sn)return;const fx=fd.x*G+G/2,fy=fd.y*G+G/2;x.fillStyle='#ff4757';x.shadowColor='rgba(255,50,50,.7)';x.shadowBlur=14;x.beginPath();x.arc(fx,fy,G/2-2,0,Math.PI*2);x.fill();x.shadowBlur=0;x.fillStyle='rgba(255,255,255,.3)';x.beginPath();x.arc(fx-3,fy-3,3,0,Math.PI*2);x.fill();x.fillStyle='#2ed573';x.beginPath();x.ellipse(fx+1,fy-G/2+4,3,5,-.4,0,Math.PI*2);x.fill();for(let i=sn.length-1;i>=0;i--){const s=sn[i],t=1-i/sn.length,g=Math.floor(160+95*t);x.shadowColor=i===0?'rgba(0,242,96,.6)':'rgba(0,242,96,.15)';x.shadowBlur=i===0?12:4;x.fillStyle=`rgb(10,${g},${Math.floor(40+60*t)})`;rr(s.x*G+.5,s.y*G+.5,G-1,G-1,5);x.fill();x.shadowBlur=0;}const h=sn[0],hx=h.x*G,hy=h.y*G;let e1x,e1y,e2x,e2y;if(dr.x===1){e1x=hx+13;e1y=hy+6;e2x=hx+13;e2y=hy+14;}else if(dr.x===-1){e1x=hx+6;e1y=hy+6;e2x=hx+6;e2y=hy+14;}else if(dr.y===-1){e1x=hx+6;e1y=hy+6;e2x=hx+14;e2y=hy+6;}else{e1x=hx+6;e1y=hy+13;e2x=hx+14;e2y=hy+13;}x.fillStyle='#fff';x.beginPath();x.arc(e1x,e1y,2.8,0,Math.PI*2);x.fill();x.beginPath();x.arc(e2x,e2y,2.8,0,Math.PI*2);x.fill();x.fillStyle='#111';x.beginPath();x.arc(e1x+dr.x,e1y+dr.y,1.2,0,Math.PI*2);x.fill();x.beginPath();x.arc(e2x+dr.x,e2y+dr.y,1.2,0,Math.PI*2);x.fill();if(go){x.fillStyle='rgba(255,0,0,.1)';x.fillRect(0,0,400,400);}}
function rr(px,py,w,h,r){x.beginPath();x.moveTo(px+r,py);x.lineTo(px+w-r,py);x.quadraticCurveTo(px+w,py,px+w,py+r);x.lineTo(px+w,py+h-r);x.quadraticCurveTo(px+w,py+h,px+w-r,py+h);x.lineTo(px+r,py+h);x.quadraticCurveTo(px,py+h,px,py+h-r);x.lineTo(px,py+r);x.quadraticCurveTo(px,py,px+r,py);x.closePath();}
function loop(ts){const dt=ts-lt;lt=ts;if(run){ac+=dt;while(ac>=sp){upd();ac-=sp;if(!run)break;}}draw();requestAnimationFrame(loop);}
sn=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];dr={x:1,y:0};fd={x:15,y:10};draw();requestAnimationFrame(loop);
function q(dx,dy){const l=iq.length?iq[iq.length-1]:dr;if(l.x===dx&&l.y===dy)return;if(l.x===-dx&&l.y===-dy)return;iq.push({x:dx,y:dy});}
document.addEventListener('keydown',e=>{const k=e.key;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d',' '].includes(k))e.preventDefault();switch(k){case'ArrowUp':case'w':case'W':q(0,-1);break;case'ArrowDown':case's':case'S':q(0,1);break;case'ArrowLeft':case'a':case'A':q(-1,0);break;case'ArrowRight':case'd':case'D':q(1,0);break;case' ':if(!run)restart();break;}});
document.getElementById('playBtn').onclick=restart;
let tx=0,ty=0;c.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;if(!run)restart();},{passive:true});c.addEventListener('touchmove',e=>{e.preventDefault();const dx=e.touches[0].clientX-tx,dy=e.touches[0].clientY-ty;if(Math.max(Math.abs(dx),Math.abs(dy))<15)return;Math.abs(dx)>Math.abs(dy)?q(dx>0?1:-1,0):q(0,dy>0?1:-1);tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:false});
document.getElementById('du').onpointerdown=()=>{if(run)q(0,-1);else restart();};
document.getElementById('dd').onpointerdown=()=>{if(run)q(0,1);else restart();};
document.getElementById('dl').onpointerdown=()=>{if(run)q(-1,0);else restart();};
document.getElementById('dr').onpointerdown=()=>{if(run)q(1,0);else restart();};
</script>
</body>
</html>
