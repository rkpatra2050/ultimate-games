<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>🎰 Slot Machine</title>
  <link rel="stylesheet" href="../../css/game-common.css"/>
  <style>
    .machine{max-width:360px;width:min(90vw,360px);margin:16px auto;padding:clamp(16px,4vw,30px);background:linear-gradient(145deg,#1a1a3e,#12122a);border:2px solid #2a2a5a;border-radius:20px;box-shadow:0 0 40px rgba(255,159,67,.1);}
    @media(max-width:600px){.machine{width:96vw;max-width:96vw;}}
    .reels{display:flex;justify-content:center;gap:clamp(8px,3vw,16px);margin:16px 0;}
    .reel{width:clamp(70px,20vw,90px);height:clamp(80px,22vw,100px);background:#0d1b2a;border:3px solid #2a2a5a;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:clamp(2.5rem,8vw,3.5rem);transition:border-color .3s;overflow:hidden;}
    .reel.win{border-color:#feca57;box-shadow:0 0 20px rgba(254,202,87,.4);}
    .reel.spinning{animation:spin .1s linear infinite;}
    @keyframes spin{0%{transform:translateY(-5px);}50%{transform:translateY(5px);}100%{transform:translateY(-5px);}}
    .spin-btn{display:block;width:100%;padding:clamp(14px,4vw,20px);font-size:clamp(1.2rem,4vw,1.5rem);font-weight:800;color:#111;background:linear-gradient(135deg,#feca57,#ff9f43);border:none;border-radius:14px;cursor:pointer;letter-spacing:1px;-webkit-tap-highlight-color:transparent;margin-top:12px;}
    .spin-btn:active{transform:scale(.96);}
    .spin-btn:disabled{opacity:.5;cursor:not-allowed;}
    .coins-display{text-align:center;font-size:clamp(1.3rem,4.5vw,1.8rem);font-weight:800;color:#feca57;margin:10px 0;}
    .msg{text-align:center;font-size:clamp(1rem,3.5vw,1.3rem);min-height:36px;color:#00f260;margin-top:12px;}
    .paytable{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;font-size:clamp(.7rem,2.2vw,.85rem);color:#666;}
    .paytable span{text-align:center;padding:4px;background:rgba(255,255,255,.03);border-radius:6px;}
  </style>
</head>
<body>
  <a href="../../index.html" class="back-btn">← Back</a>
  <div class="game-header">
    <h1>🎰 Slot Machine</h1>
  </div>
  <div class="coins-display">🪙 <span id="coins">100</span></div>
  <div class="machine">
    <div class="reels">
      <div class="reel" id="r0">🍒</div>
      <div class="reel" id="r1">⭐</div>
      <div class="reel" id="r2">🍒</div>
    </div>
    <button class="spin-btn" id="spinBtn">🎰 SPIN (10 🪙)</button>
    <div class="msg" id="msg"></div>
    <div class="paytable">
      <span>🍒🍒🍒 = 50🪙</span><span>⭐⭐⭐ = 100🪙</span>
      <span>💎💎💎 = 200🪙</span><span>7️⃣7️⃣7️⃣ = 500🪙</span>
      <span>🍒🍒 = 10🪙</span><span>Any pair = 5🪙</span>
    </div>
  </div>
<script>
const SYMS=['🍒','🍋','🍊','⭐','💎','7️⃣','🔔'];
const reels=[document.getElementById('r0'),document.getElementById('r1'),document.getElementById('r2')];
const coinE=document.getElementById('coins'),msgE=document.getElementById('msg'),spinBtn=document.getElementById('spinBtn');
let coins=100,spinning=false;

function spin(){
  if(spinning||coins<10)return;
  coins-=10;coinE.textContent=coins;spinning=true;msgE.textContent='';
  reels.forEach(r=>r.classList.add('spinning'));

  // determine result
  const res=SYMS.map(()=>SYMS[Math.floor(Math.random()*SYMS.length)]);
  // slight bias toward pairs for fun
  if(Math.random()<.2)res[1]=res[0];
  if(Math.random()<.08)res[2]=res[0];

  // reveal one by one
  setTimeout(()=>{reels[0].classList.remove('spinning');reels[0].textContent=res[0];},600);
  setTimeout(()=>{reels[1].classList.remove('spinning');reels[1].textContent=res[1];},1100);
  setTimeout(()=>{
    reels[2].classList.remove('spinning');reels[2].textContent=res[2];
    evaluate(res);spinning=false;
  },1600);
}

function evaluate(r){
  let win=0;reels.forEach(e=>e.classList.remove('win'));
  if(r[0]===r[1]&&r[1]===r[2]){
    // triple
    const s=r[0];
    win=s==='7️⃣'?500:s==='💎'?200:s==='⭐'?100:50;
    reels.forEach(e=>e.classList.add('win'));
    msgE.textContent=`🎉 JACKPOT! +${win}🪙`;
  }else if(r[0]===r[1]||r[1]===r[2]||r[0]===r[2]){
    win=r.includes('🍒')?10:5;
    const pairs=[];if(r[0]===r[1])pairs.push(0,1);if(r[1]===r[2])pairs.push(1,2);if(r[0]===r[2])pairs.push(0,2);
    [...new Set(pairs)].forEach(i=>reels[i].classList.add('win'));
    msgE.textContent=`✨ Pair! +${win}🪙`;
  }else{
    msgE.textContent='Try again!';
  }
  coins+=win;coinE.textContent=coins;
  if(coins<=0){msgE.textContent='💸 Out of coins! Resetting...';setTimeout(()=>{coins=100;coinE.textContent=100;msgE.textContent='';},2000);}
}

spinBtn.onclick=spin;
document.addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();spin();}});
</script>
</body>
</html>
