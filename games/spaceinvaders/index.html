<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>👾 Space Invaders</title>
  <link rel="stylesheet" href="../../css/game-common.css"/>
  <style>
    #wrap{position:relative;margin:0 auto;max-width:400px;width:min(92vw,400px);aspect-ratio:3/4;touch-action:none;}
    canvas{width:100%;height:100%;}
    @media(max-width:600px){#wrap{width:98vw;max-width:98vw;}}
    #ov{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,10,26,.9);border-radius:10px;z-index:10;transition:opacity .3s;gap:12px;padding:20px;}
    #ov.hidden{opacity:0;pointer-events:none;}
    #ov h2{font-size:clamp(1.5rem,5vw,2.2rem);}
    .fin{font-size:clamp(2rem,8vw,3rem);font-weight:900;color:#48dbfb;text-shadow:0 0 20px rgba(72,219,251,.5);}
    .sub{color:#888;font-size:.95rem;}
    .btn{padding:14px 36px;font-size:1.1rem;font-weight:700;color:#fff;background:linear-gradient(135deg,#48dbfb,#0575e6);border:none;border-radius:50px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .btn:active{transform:scale(.95);}
    .ctrls{display:none;margin:10px auto 0;width:fit-content;user-select:none;-webkit-user-select:none;}
    .cr{display:flex;gap:8px;justify-content:center;align-items:center;}
    .cb{width:clamp(56px,15vw,70px);height:clamp(56px,15vw,70px);font-size:1.5rem;background:rgba(72,219,251,.1);color:#48dbfb;border:2px solid rgba(72,219,251,.35);border-radius:16px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;}
    .cb:active{background:rgba(72,219,251,.3);transform:scale(.93);}
    .cb-f{width:clamp(120px,32vw,160px);background:rgba(255,71,87,.12);color:#ff4757;border-color:rgba(255,71,87,.4);}
    .cb-f:active{background:rgba(255,71,87,.35);}
    @media(pointer:coarse){.ctrls{display:block;}}
  </style>
</head>
<body>
  <a href="../../index.html" class="back-btn">← Back</a>
  <div class="game-header">
    <h1>👾 Space Invaders</h1>
    <div class="score-board">
      <span>Score: <strong id="sc">0</strong></span>
      <span>Lives: <strong id="lv">3</strong></span>
      <span>Best: <strong id="hi">0</strong></span>
    </div>
  </div>
  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="ov">
      <h2>👾 Space Invaders</h2>
      <p class="sub">Destroy the alien fleet!</p>
      <button class="btn" id="playBtn">▶ PLAY</button>
    </div>
  </div>
  <div class="ctrls">
    <div class="cr">
      <button class="cb" id="bl">◀</button>
      <button class="cb cb-f" id="bf">🔥 FIRE</button>
      <button class="cb" id="br">▶</button>
    </div>
  </div>
<script>
const cv=document.getElementById('c'),X=cv.getContext('2d');
const W=400,H=533;cv.width=W;cv.height=H;
const scE=document.getElementById('sc'),lvE=document.getElementById('lv'),hiE=document.getElementById('hi'),ov=document.getElementById('ov');
let best=+localStorage.getItem('si_hi')||0;hiE.textContent=best;

/* state */
let px=W/2-16,bul=[],en=[],eb=[],sc=0,lives=3,wave=1,run=false,go=false;
let eDir=1,fr=0,eTk=0,eSh=0;
const PW=32,PH=20,EC=['#00f260','#feca57','#ff4757'];
const keys={};

/* input */
document.addEventListener('keydown',e=>{keys[e.key]=true;if([' ','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>{delete keys[e.key];});
let mL=false,mR=false;
function bind(id,fn){const el=document.getElementById(id);['pointerdown'].forEach(t=>el.addEventListener(t,e=>{e.preventDefault();fn(true);}));['pointerup','pointerleave','pointercancel'].forEach(t=>el.addEventListener(t,()=>fn(false)));}
bind('bl',v=>mL=v);bind('br',v=>mR=v);
document.getElementById('bf').addEventListener('pointerdown',e=>{e.preventDefault();shoot();});

function shoot(){if(!run||bul.length>=4)return;bul.push({x:px+PW/2-2,y:H-42,w:4,h:12});}

function spawn(){
  en=[];eDir=1;eTk=0;eSh=0;
  const rows=Math.min(5,3+Math.floor((wave-1)/2)),cols=Math.min(10,6+Math.floor((wave-1)/3));
  const ew=28,eh=20,gap=6,tw=cols*(ew+gap)-gap,sx=(W-tw)/2;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)en.push({x:sx+c*(ew+gap),y:40+r*(eh+gap+4),w:ew,h:eh,type:r<1?2:r<3?1:0,alive:true});
}

function init(){
  px=W/2-PW/2;bul=[];eb=[];sc=0;lives=3;wave=1;fr=0;go=false;run=true;
  scE.textContent=0;lvE.textContent=3;ov.classList.add('hidden');spawn();
}

function die(){
  run=false;go=true;
  if(sc>best){best=sc;hiE.textContent=best;localStorage.setItem('si_hi',best);}
  ov.innerHTML=`<h2>💀 Game Over</h2><div class="fin">${sc}</div><p class="sub">${sc>=best&&sc>0?'🏆 New Best!':'Wave '+wave}</p><button class="btn" id="rb">↻ AGAIN</button>`;
  ov.classList.remove('hidden');document.getElementById('rb').onclick=init;
}

function update(){
  fr++;
  if(keys.ArrowLeft||keys.a||mL)px-=5;
  if(keys.ArrowRight||keys.d||mR)px+=5;
  px=Math.max(0,Math.min(W-PW,px));
  if(keys[' ']&&fr%8===0)shoot();

  for(let b of bul)b.y-=7;bul=bul.filter(b=>b.y>-20);
  for(let b of eb)b.y+=3+wave*.3;eb=eb.filter(b=>b.y<H+10);

  // move enemies
  eTk++;
  const step=Math.max(2,18-wave*2);
  if(eTk%step===0){
    let edge=false;
    for(let e of en)if(e.alive&&((eDir>0&&e.x+e.w>=W-8)||(eDir<0&&e.x<=8)))edge=true;
    if(edge)eDir*=-1;
    const spd=0.4+wave*0.15;
    for(let e of en){if(!e.alive)continue;e.x+=eDir*spd*step;if(edge)e.y+=10;}
  }

  // enemy shoot
  eSh++;
  if(eSh>=Math.max(12,45-wave*4)){
    eSh=0;const alive=en.filter(e=>e.alive);
    if(alive.length){const s=alive[Math.floor(Math.random()*alive.length)];eb.push({x:s.x+s.w/2-2,y:s.y+s.h,w:4,h:10});}
  }

  // hit enemies
  for(let b of bul)for(let e of en){
    if(!e.alive)continue;
    if(b.x<e.x+e.w&&b.x+b.w>e.x&&b.y<e.y+e.h&&b.y+b.h>e.y){e.alive=false;b.y=-999;sc+=(e.type+1)*10;scE.textContent=sc;}
  }

  // hit player
  for(let b of eb){
    if(b.x<px+PW&&b.x+b.w>px&&b.y+b.h>H-42&&b.y<H-42+PH){b.y=9999;lives--;lvE.textContent=lives;if(lives<=0)return die();}
  }

  // enemies reach bottom
  for(let e of en)if(e.alive&&e.y+e.h>=H-44)return die();

  // next wave
  if(en.every(e=>!e.alive)){wave++;spawn();}
}

function draw(){
  X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);
  // stars
  X.fillStyle='rgba(255,255,255,.2)';
  for(let i=0;i<30;i++){X.fillRect((i*137+fr*.1*(i%3+1))%W,(i*89+fr*.05*(i%2+1))%H,1.5,1.5);}

  // enemies
  for(let e of en){
    if(!e.alive)continue;
    X.fillStyle=EC[e.type];X.shadowColor=EC[e.type];X.shadowBlur=6;
    X.fillRect(e.x+4,e.y,e.w-8,e.h);X.fillRect(e.x,e.y+4,e.w,e.h-8);
    X.fillStyle='#fff';X.fillRect(e.x+6,e.y+6,4,4);X.fillRect(e.x+e.w-10,e.y+6,4,4);
    X.fillStyle='#111';X.fillRect(e.x+7,e.y+7,2,2);X.fillRect(e.x+e.w-9,e.y+7,2,2);
    X.fillStyle=EC[e.type];
    const lo=Math.sin(fr*.1)*2;X.fillRect(e.x+2,e.y+e.h-2,4,4+lo);X.fillRect(e.x+e.w-6,e.y+e.h-2,4,4-lo);
    X.shadowBlur=0;
  }

  // player ship
  if(px!==undefined){
    X.fillStyle='#48dbfb';X.shadowColor='#48dbfb';X.shadowBlur=10;
    X.beginPath();X.moveTo(px+PW/2,H-42);X.lineTo(px,H-22);X.lineTo(px+6,H-26);X.lineTo(px+PW-6,H-26);X.lineTo(px+PW,H-22);X.closePath();X.fill();
    X.fillStyle='#ff9f43';X.shadowColor='#ff9f43';X.shadowBlur=8;
    X.fillRect(px+PW/2-4,H-22,8,4+Math.sin(fr*.5)*2);X.shadowBlur=0;
  }

  // bullets
  X.shadowBlur=6;
  X.fillStyle='#48dbfb';X.shadowColor='#48dbfb';for(let b of bul)X.fillRect(b.x,b.y,b.w,b.h);
  X.fillStyle='#ff4757';X.shadowColor='#ff4757';for(let b of eb)X.fillRect(b.x,b.y,b.w,b.h);
  X.shadowBlur=0;

  if(run){X.fillStyle='rgba(255,255,255,.3)';X.font='bold 14px Inter,sans-serif';X.textAlign='right';X.fillText('Wave '+wave,W-12,20);}
}

function loop(){if(run)update();draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
document.getElementById('playBtn').onclick=init;

// canvas touch
cv.addEventListener('touchstart',e=>{
  if(e.target.closest('.back-btn'))return;e.preventDefault();
  const r=cv.getBoundingClientRect(),tx=(e.touches[0].clientX-r.left)/r.width;
  if(tx<.33)mL=true;else if(tx>.66)mR=true;else shoot();
},{passive:false});
cv.addEventListener('touchend',()=>{mL=false;mR=false;},{passive:true});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();const r=cv.getBoundingClientRect(),tx=(e.touches[0].clientX-r.left)/r.width;
  mL=tx<.33;mR=tx>.66;
},{passive:false});
</script>
</body>
</html>
