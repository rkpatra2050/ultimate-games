<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🧨 Breakout</title>
  <link rel="stylesheet" href="../../css/game-common.css" />
  <style>
    #wrap{position:relative;margin:0 auto;max-width:480px;width:min(92vw,480px);aspect-ratio:4/3;touch-action:none;}
    canvas{width:100%;height:100%;}
    #overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,10,26,.88);border-radius:10px;z-index:10;transition:opacity .3s;gap:12px;padding:20px;}
    #overlay.hidden{opacity:0;pointer-events:none;}
    #overlay h2{font-size:clamp(1.5rem,5vw,2.2rem);}
    .final{font-size:clamp(2rem,8vw,3rem);font-weight:900;color:#f368e0;text-shadow:0 0 20px rgba(243,104,224,.5);}
    .sub{color:#888;font-size:.95rem;}
    .btn{padding:14px 36px;font-size:1.1rem;font-weight:700;color:#fff;background:linear-gradient(135deg,#f368e0,#a855f7);border:none;border-radius:50px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .btn:active{transform:scale(0.95);}
    .hint{display:none;text-align:center;color:#666;font-size:.78rem;margin-top:8px;}
    @media(pointer:coarse){.hint{display:block;}}
  </style>
</head>
<body>
  <a href="../../index.html" class="back-btn">← Back</a>
  <div class="game-header">
    <h1>🧨 Breakout</h1>
    <div class="score-board">
      <span>Score: <strong id="score">0</strong></span>
      <span>Lives: <strong id="lives">3</strong></span>
    </div>
  </div>
  <div id="wrap">
    <canvas id="c" width="480" height="360"></canvas>
    <div id="overlay">
      <h2>🧨 Breakout</h2>
      <p class="sub">Move paddle with mouse/touch. Smash all bricks!</p>
      <button class="btn" id="playBtn">▶ PLAY</button>
    </div>
  </div>
  <p class="hint">👆 Slide your finger to move the paddle</p>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=480,H=360;
const PW=70,PH=12,BR=6,ROWS=5,COLS=8,BW=52,BH=18,BPAD=6,BTOP=40;
const COLORS=['#ff4757','#ff6b6b','#feca57','#00f260','#48dbfb'];
let px=W/2-PW/2,bx=W/2,by=H-40,bvx=0,bvy=0,bricks=[],sc=0,lives=3,run=false;
const sEl=document.getElementById('score'),lEl=document.getElementById('lives'),ov=document.getElementById('overlay');
function makeBricks(){const b=[];for(let r=0;r<ROWS;r++)for(let cl=0;cl<COLS;cl++)b.push({x:BPAD+cl*(BW+BPAD)+10,y:BTOP+r*(BH+BPAD),w:BW,h:BH,color:COLORS[r],alive:true});return b;}
function init(){px=W/2-PW/2;resetBall();bricks=makeBricks();sc=0;lives=3;run=true;sEl.textContent=0;lEl.textContent=3;ov.classList.add('hidden');}
function resetBall(){bx=W/2;by=H-40;const a=-Math.PI/2+(Math.random()-.5)*.8;bvx=4*Math.cos(a);bvy=4*Math.sin(a);}
function update(){bx+=bvx;by+=bvy;if(bx-BR<0||bx+BR>W)bvx=-bvx;if(by-BR<0)bvy=-bvy;
if(by+BR>=H-PH-4&&by+BR<=H-PH+4&&bx>=px&&bx<=px+PW){bvy=-Math.abs(bvy);bvx+=((bx-(px+PW/2))/PW)*3;}
if(by>H){lives--;lEl.textContent=lives;if(lives<=0)return die();resetBall();}
for(let b of bricks){if(!b.alive)continue;if(bx+BR>b.x&&bx-BR<b.x+b.w&&by+BR>b.y&&by-BR<b.y+b.h){b.alive=false;bvy=-bvy;sc+=10;sEl.textContent=sc;}}
if(bricks.every(b=>!b.alive))return win();}
function die(){run=false;ov.innerHTML=`<h2>💀 Game Over</h2><div class="final">${sc}</div><p class="sub">Score</p><button class="btn" id="rb">↻ AGAIN</button>`;ov.classList.remove('hidden');document.getElementById('rb').onclick=init;}
function win(){run=false;ov.innerHTML=`<h2>🎉 You Win!</h2><div class="final">${sc}</div><p class="sub">All bricks destroyed!</p><button class="btn" id="rb">↻ AGAIN</button>`;ov.classList.remove('hidden');document.getElementById('rb').onclick=init;}
function draw(){ctx.fillStyle='#0d1b2a';ctx.fillRect(0,0,W,H);
for(let b of bricks){if(!b.alive)continue;ctx.fillStyle=b.color;ctx.shadowColor=b.color;ctx.shadowBlur=6;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(b.x+2,b.y+2,b.w-4,b.h/2-2);}
ctx.fillStyle='#f368e0';ctx.shadowColor='#f368e0';ctx.shadowBlur=10;ctx.fillRect(px,H-PH-4,PW,PH);ctx.shadowBlur=0;
ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(bx,by,BR,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
function loop(){if(run)update();draw();requestAnimationFrame(loop);}
draw();requestAnimationFrame(loop);
document.getElementById('playBtn').onclick=init;
function setPaddle(clientX){const r=c.getBoundingClientRect();px=(clientX-r.left)/r.width*W-PW/2;px=Math.max(0,Math.min(W-PW,px));}
c.addEventListener('mousemove',e=>setPaddle(e.clientX));
c.addEventListener('touchmove',e=>{e.preventDefault();setPaddle(e.touches[0].clientX);},{passive:false});
c.addEventListener('touchstart',e=>{if(!run)init();setPaddle(e.touches[0].clientX);},{passive:true});
</script>
</body>
</html>
