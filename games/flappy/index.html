<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🐦 Flappy Bird</title>
  <link rel="stylesheet" href="../../css/game-common.css" />
  <style>
    #wrap{position:relative;margin:0 auto;max-width:320px;width:min(85vw,320px);aspect-ratio:8/12;touch-action:none;}
    canvas{width:100%;height:100%;border-radius:10px;}
    @media(max-width:600px){#wrap{width:92vw;max-width:92vw;}}
    #overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,10,26,.85);border-radius:10px;z-index:10;transition:opacity .3s;gap:12px;padding:20px;}
    #overlay.hidden{opacity:0;pointer-events:none;}
    #overlay h2{font-size:clamp(1.5rem,5vw,2.2rem);}
    .final{font-size:clamp(2rem,8vw,3rem);font-weight:900;color:#48dbfb;text-shadow:0 0 20px rgba(72,219,251,.5);}
    .sub{color:#888;font-size:.95rem;}
    .btn{padding:14px 36px;font-size:1.1rem;font-weight:700;color:#fff;background:linear-gradient(135deg,#48dbfb,#0575e6);border:none;border-radius:50px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .btn:active{transform:scale(0.95);}
    .hint{display:none;text-align:center;color:#666;font-size:.78rem;margin-top:8px;}
    @media(pointer:coarse){.hint{display:block;}}
  </style>
</head>
<body>
  <a href="../../index.html" class="back-btn">← Back</a>
  <div class="game-header">
    <h1>🐦 Flappy Bird</h1>
    <div class="score-board">
      <span>Score: <strong id="score">0</strong></span>
      <span>Best: <strong id="best">0</strong></span>
    </div>
  </div>
  <div id="wrap">
    <canvas id="c" width="320" height="480"></canvas>
    <div id="overlay">
      <h2>🐦 Flappy Bird</h2>
      <p class="sub">Tap or press Space to fly!</p>
      <button class="btn" id="playBtn">▶ PLAY</button>
    </div>
  </div>
  <p class="hint">👆 Tap anywhere on screen to flap</p>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=320,H=480;
const GRAV=0.4,FLAP=-6.5,PIPE_W=52,GAP=130,PIPE_SPD=2.2,BIRD_R=14;
let by=H/2,bv=0,pipes=[],sc,hi,run=false,go=false,fr=0;
const sEl=document.getElementById('score'),bEl=document.getElementById('best'),ov=document.getElementById('overlay');
hi=+localStorage.getItem('fl_hi')||0;bEl.textContent=hi;
function init(){by=H/2;bv=0;pipes=[];sc=0;run=true;go=false;fr=0;sEl.textContent=0;ov.classList.add('hidden');addPipe();}
function addPipe(){const minY=80,maxY=H-GAP-80;const topH=minY+Math.random()*(maxY-minY);pipes.push({x:W+20,top:topH,scored:false});}
function flap(){if(!run)return;bv=FLAP;}
function update(){bv+=GRAV;by+=bv;fr++;if(fr%90===0)addPipe();for(let p of pipes){p.x-=PIPE_SPD;if(!p.scored&&p.x+PIPE_W<W/2-BIRD_R){p.scored=true;sc++;sEl.textContent=sc;}}pipes=pipes.filter(p=>p.x>-PIPE_W);
const bx=80;for(let p of pipes){if(bx+BIRD_R>p.x&&bx-BIRD_R<p.x+PIPE_W){if(by-BIRD_R<p.top||by+BIRD_R>p.top+GAP)return die();}}if(by>H-20||by<0)return die();}
function die(){run=false;go=true;if(sc>hi){hi=sc;bEl.textContent=hi;localStorage.setItem('fl_hi',hi);}ov.innerHTML=`<h2>💀 Game Over</h2><div class="final">${sc}</div><p class="sub">${sc>=hi&&sc>0?'🏆 New Best!':'Score'}</p><button class="btn" id="rb">↻ AGAIN</button>`;ov.classList.remove('hidden');document.getElementById('rb').onclick=init;}
function draw(){
// sky gradient
const grd=ctx.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#1a1a3e');grd.addColorStop(1,'#0d1b2a');ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
// ground
ctx.fillStyle='#2d5016';ctx.fillRect(0,H-20,W,20);ctx.fillStyle='#3a6b1e';ctx.fillRect(0,H-22,W,4);
// pipes
for(let p of pipes){ctx.fillStyle='#2ed573';ctx.shadowColor='#2ed573';ctx.shadowBlur=8;
ctx.fillRect(p.x,0,PIPE_W,p.top);ctx.fillRect(p.x-4,p.top-16,PIPE_W+8,16);
ctx.fillRect(p.x,p.top+GAP,PIPE_W,H-p.top-GAP-20);ctx.fillRect(p.x-4,p.top+GAP,PIPE_W+8,16);ctx.shadowBlur=0;
ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(p.x+4,0,8,p.top-16);ctx.fillRect(p.x+4,p.top+GAP+16,8,H-p.top-GAP-36);}
// bird
const bx=80;ctx.save();ctx.translate(bx,by);const angle=run?Math.min(Math.max(bv*3,-30),60)*Math.PI/180:0;ctx.rotate(angle);
ctx.fillStyle='#feca57';ctx.shadowColor='#feca57';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(0,0,BIRD_R,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(6,-3,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#222';ctx.beginPath();ctx.arc(8,-3,2.5,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#ff6b6b';ctx.beginPath();ctx.moveTo(BIRD_R,0);ctx.lineTo(BIRD_R+8,-3);ctx.lineTo(BIRD_R+8,4);ctx.closePath();ctx.fill();
// wing
ctx.fillStyle='#f0c040';ctx.beginPath();ctx.ellipse(-4,5,8,5,-.2+Math.sin((run?fr:Date.now()*0.003)*.3)*.3,0,Math.PI*2);ctx.fill();
ctx.restore();
// score on screen
ctx.fillStyle='rgba(255,255,255,.8)';ctx.font='bold 36px Inter,sans-serif';ctx.textAlign='center';if(run)ctx.fillText(sc,W/2,60);}
function loop(){if(run)update();draw();requestAnimationFrame(loop);}
by=H/2;draw();requestAnimationFrame(loop);
document.getElementById('playBtn').onclick=init;
document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='ArrowUp'){e.preventDefault();if(run)flap();else if(go)init();}});
c.addEventListener('click',()=>{if(run)flap();});
document.addEventListener('touchstart',e=>{if(e.target.closest('.back-btn'))return;e.preventDefault();if(run)flap();else if(go)init();},{passive:false});
</script>
</body>
</html>
