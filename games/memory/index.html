<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🧠 Memory Match</title>
  <link rel="stylesheet" href="../../css/game-common.css" />
  <style>
    .board{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(6px,2vw,10px);max-width:400px;width:min(90vw,400px);margin:10px auto;padding:clamp(6px,2vw,10px);}
    .card{aspect-ratio:1;background:#1a1a3e;border:2px solid #2a2a5a;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:clamp(1.5rem,5vw,2.8rem);cursor:pointer;transition:background .3s,border-color .3s;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
    .card:active{transform:scale(0.95);}
    .card.flipped,.card.matched{background:#12122a;border-color:#0575e6;}
    .card.matched{border-color:#00f260;box-shadow:0 0 12px rgba(0,242,96,.3);}
    .card .front{display:none;}
    .card.flipped .front,.card.matched .front{display:block;}
    .card .back{display:block;}
    .card.flipped .back,.card.matched .back{display:none;}
    .win{text-align:center;margin-top:16px;font-size:clamp(1rem,3.5vw,1.3rem);color:#00f260;min-height:40px;}
    .btn{display:block;margin:10px auto;padding:12px 32px;font-size:1rem;font-weight:700;color:#fff;background:linear-gradient(135deg,#ff9ff3,#f368e0);border:none;border-radius:50px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .btn:active{transform:scale(0.95);}
    .info{text-align:center;color:#888;font-size:.9rem;margin-top:6px;}
  </style>
</head>
<body>
  <a href="../../index.html" class="back-btn">← Back</a>
  <div class="game-header">
    <h1>🧠 Memory Match</h1>
    <div class="score-board">
      <span>Moves: <strong id="moves">0</strong></span>
      <span>Pairs: <strong id="pairs">0</strong>/8</span>
    </div>
  </div>
  <div class="board" id="board"></div>
  <div class="win" id="win"></div>
  <button class="btn" id="restart">↻ New Game</button>
  <p class="info">Find all matching pairs!</p>
<script>
const EMOJIS=['🐶','🐱','🦊','🐻','🐼','🦁','🐸','🐵'];
const boardEl=document.getElementById('board'),movesEl=document.getElementById('moves'),pairsEl=document.getElementById('pairs'),winEl=document.getElementById('win');
let cards,flipped=[],locked=false,moves=0,pairs=0;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function init(){const deck=shuffle([...EMOJIS,...EMOJIS]);boardEl.innerHTML='';flipped=[];locked=false;moves=0;pairs=0;movesEl.textContent=0;pairsEl.textContent='0';winEl.textContent='';
cards=deck.map((e,i)=>{const d=document.createElement('div');d.className='card';d.dataset.emoji=e;d.dataset.idx=i;d.innerHTML=`<span class="front">${e}</span><span class="back">❓</span>`;d.addEventListener('click',()=>flip(d));boardEl.appendChild(d);return d;});}
function flip(card){if(locked||card.classList.contains('flipped')||card.classList.contains('matched'))return;card.classList.add('flipped');flipped.push(card);if(flipped.length===2){moves++;movesEl.textContent=moves;locked=true;const[a,b]=flipped;if(a.dataset.emoji===b.dataset.emoji){a.classList.add('matched');b.classList.add('matched');pairs++;pairsEl.textContent=pairs;flipped=[];locked=false;if(pairs===8){winEl.textContent=`🎉 You won in ${moves} moves!`;}}else{setTimeout(()=>{a.classList.remove('flipped');b.classList.remove('flipped');flipped=[];locked=false;},700);}}}
document.getElementById('restart').onclick=init;
init();
</script>
</body>
</html>
